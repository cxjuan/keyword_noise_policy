seed: 7
dataset: CelebA
data_root: ./_data/CelebA/processed
output_dir: ./outputs/CelebA_clip_keyword

image_size: 64
channels: 3

#"a face with red hair"
#"a face with golden hair"
#"a face wearing glasses"
#"a human face"
#"a face with dark skin"

keyword:
  type: clip_text
  name: glasses
  prompts:
    - "a portrait photo of a person with golden hair"
    - "a face with blond hair"
    - "a person with light golden hair"

  negative_prompts:
    - "a portrait photo of a person"
    - "a close-up face photo"
    - "a human face"

  saliency_top_ratio: 0.30
  saliency_smooth: true
  saliency_dilate: true
  detect_score_threshold: 0.75
  release_score_limit: 0.45
  zero_mask_when_not_detected: true
  score_scale: 25.0
  score_margin: 0.1
  clip_model: ViT-B-32
  clip_pretrained: laion2b_s34b_b79k

diffusion:
  T: 1000
  beta_start: 0.0001
  beta_end: 0.02
  min_t: 50
  max_extra_t: 750
  sensitivity_l2: 1.0
  delta: 1.0e-5
  target_epsilon: 2.0

keyword_actions:
  extra_t_keyword: [0, 100, 200, 350, 500]
  extra_t_background: [0, 25, 50]
  denoise_keyword: [0.0, 0.10, 0.25]
  denoise_background: [0.25, 0.50, 0.75]
  risk_threshold: [0.03, 0.06, 0.10, 0.15]

keyword_guard:
  enabled: true
  score_trigger: 0.80

  min_extra_keyword_when_detected: 100
  max_denoise_keyword_when_detected: 0.10
  max_threshold_when_detected: 0.05

  max_extra_keyword_when_not_detected: 0
  min_denoise_keyword_when_not_detected: 0.50

ppo:
  obs_dim: 10
  hidden_dim: 128
  lr: 0.0003
  gamma: 0.99
  clip_eps: 0.2
  entropy_coef: 0.03
  value_coef: 0.5
  epochs: 4
  batch_size: 128
  updates: 500
  rollout_steps: 512

reward:
  global_utility_weight: 0.30
  background_utility_weight: 1.00
  keyword_confidence_weight: 4.00
  risk_weight: 2.00
  keyword_denoise_penalty: 0.70
  background_noise_penalty: 0.50
  keyword_noise_bonus: 0.70
  reject_penalty_weight: 0.02